spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: rikser-yandex-fetcher
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.xml
    drop-first: true
  cloud:
    compatibility-verifier:
      enabled: false
  datasource:
    hikari:
      schema: public

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

bundle:
  security:
    enabled: false
    service:
      enabled: false
      url: http://localhost:8081
  redis:
    enabled: false
  kafka:
    enabled: false
    kafka-url: http://localhost:9092
    user: user
    password: password

logbook:
  enabled: false

fetch:
  queue-limit: 3
  timeout-queue-limit: 3
  max-download-attempt: 3
  repeat-download-delay: 3
  max-body-size: 512 000
  chunk-size: 2000
  word-overlap-count: 200
  clear-delay: 300

kafka:
  scheduler-delay: PT10S

rest:
  connection-timeout: 5
  read-timeout: 10

bothub:
  token: token
  url: http://localhost:8081
  summary_model: deepseek-v4-flash
  analysis_model: deepseek-v4-pro
  timeout: 60
